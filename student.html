<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | EduChain AI+</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <!-- Navigation -->
    <nav class="bg-gradient-to-r from-purple-600 to-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="text-2xl font-bold">🔗 EduChain AI+ Admin</div>
                <div class="space-x-4">
                    <a href="/" class="hover:text-gray-200">Home</a>
                    <a href="/admin" class="hover:text-gray-200">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-8">
        <h1 class="text-4xl font-bold mb-8 text-gray-800">Admin Dashboard</h1>

        <!-- Tabs -->
        <div class="mb-6 border-b border-gray-300">
            <div class="flex space-x-4">
                <button onclick="showTab('wallets')" id="tab-wallets" class="px-6 py-3 font-semibold border-b-4 border-purple-600 text-purple-600">
                    Wallets
                </button>
                <button onclick="showTab('issue')" id="tab-issue" class="px-6 py-3 font-semibold text-gray-600 hover:text-purple-600">
                    Issue Certificate
                </button>
                <button onclick="showTab('students')" id="tab-students" class="px-6 py-3 font-semibold text-gray-600 hover:text-purple-600">
                    Students
                </button>
                <button onclick="showTab('blockchain')" id="tab-blockchain" class="px-6 py-3 font-semibold text-gray-600 hover:text-purple-600">
                    Blockchain
                </button>
            </div>
        </div>

        <!-- Wallets Tab -->
        <div id="content-wallets" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Create Admin Wallet -->
                <div class="bg-white p-6 rounded-lg shadow-lg">
                    <h2 class="text-2xl font-bold mb-4 text-gray-800">Create Admin Wallet</h2>
                    <form id="createAdminForm" class="space-y-4">
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Institution Name</label>
                            <input type="text" id="institutionName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Admin Name</label>
                            <input type="text" id="adminName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                        </div>
                        <button type="submit" class="w-full bg-purple-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-purple-700">
                            Create Admin Wallet
                        </button>
                    </form>
                    <div id="adminWalletResult" class="mt-4"></div>
                </div>

                <!-- Create Student Wallet -->
                <div class="bg-white p-6 rounded-lg shadow-lg">
                    <h2 class="text-2xl font-bold mb-4 text-gray-800">Register Student</h2>
                    <form id="createStudentForm" class="space-y-4">
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Student Name</label>
                            <input type="text" id="studentName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Email</label>
                            <input type="email" id="studentEmail" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Student ID</label>
                            <input type="text" id="studentId" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-blue-700">
                            Register Student
                        </button>
                    </form>
                    <div id="studentWalletResult" class="mt-4"></div>
                </div>
            </div>
        </div>

        <!-- Issue Certificate Tab -->
        <div id="content-issue" class="tab-content hidden">
            <div class="bg-white p-8 rounded-lg shadow-lg max-w-3xl">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Issue Certificate</h2>
                <form id="issueCertForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Certificate Type</label>
                            <select id="certType" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                                <option value="">Select Type</option>
                                <option value="Completion">Completion</option>
                                <option value="Achievement">Achievement</option>
                                <option value="Excellence">Excellence</option>
                                <option value="Participation">Participation</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Student Wallet Address</label>
                            <input type="text" id="certStudentWallet" required placeholder="STUDENT-..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Student Name</label>
                            <input type="text" id="certStudentName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Course Name</label>
                            <input type="text" id="certCourse" required placeholder="e.g., Data Structures" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Grade (Optional)</label>
                            <input type="text" id="certGrade" placeholder="e.g., A+" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Year</label>
                            <input type="text" id="certYear" value="2025" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Admin Wallet Address</label>
                        <input type="text" id="certAdminWallet" required placeholder="ADMIN-..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white font-bold py-3 px-6 rounded-lg hover:from-purple-700 hover:to-blue-700">
                        Issue Certificate & Generate NFT
                    </button>
                </form>
                <div id="issueCertResult" class="mt-6"></div>
            </div>
        </div>

        <!-- Students Tab -->
        <div id="content-students" class="tab-content hidden">
            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-2xl font-bold mb-4 text-gray-800">Registered Students</h2>
                <button onclick="loadStudents()" class="mb-4 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                    Refresh List
                </button>
                <div id="studentsList" class="overflow-x-auto"></div>
            </div>
        </div>

        <!-- Blockchain Tab -->
        <div id="content-blockchain" class="tab-content hidden">
            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-2xl font-bold mb-4 text-gray-800">Blockchain Explorer</h2>
                <button onclick="loadBlockchain()" class="mb-4 bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">
                    Refresh Blockchain
                </button>
                <div id="blockchainData"></div>
            </div>
        </div>
    </div>

    <script>
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('[id^="tab-"]').forEach(el => {
                el.classList.remove('border-b-4', 'border-purple-600', 'text-purple-600');
                el.classList.add('text-gray-600');
            });
            
            document.getElementById(`content-${tabName}`).classList.remove('hidden');
            document.getElementById(`tab-${tabName}`).classList.add('border-b-4', 'border-purple-600', 'text-purple-600');
            document.getElementById(`tab-${tabName}`).classList.remove('text-gray-600');
        }

        document.getElementById('createAdminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                institution_name: document.getElementById('institutionName').value,
                admin_name: document.getElementById('adminName').value
            };
            
            const response = await fetch('/api/create_admin_wallet', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            document.getElementById('adminWalletResult').innerHTML = `
                <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded">
                    <p class="font-bold">Admin Wallet Created!</p>
                    <p class="mt-2"><strong>Wallet Address:</strong> ${result.wallet.wallet_address}</p>
                    <p class="text-xs mt-2">Use this address to issue certificates</p>
                </div>
            `;
            e.target.reset();
        });

        document.getElementById('createStudentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('studentName').value,
                email: document.getElementById('studentEmail').value,
                student_id: document.getElementById('studentId').value
            };
            
            const response = await fetch('/api/register_student', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            document.getElementById('studentWalletResult').innerHTML = `
                <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded">
                    <p class="font-bold">Student Registered!</p>
                    <p class="mt-2"><strong>Wallet Address:</strong> ${result.wallet.wallet_address}</p>
                    <a href="/student/${result.wallet.wallet_address}" class="text-blue-600 underline mt-2 inline-block">View Dashboard</a>
                </div>
            `;
            e.target.reset();
        });

        document.getElementById('issueCertForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('issueCertResult');
            resultDiv.innerHTML = '<div class="text-center text-gray-600">Issuing certificate...</div>';
            
            const data = {
                certificate_type: document.getElementById('certType').value,
                student_name: document.getElementById('certStudentName').value,
                student_wallet: document.getElementById('certStudentWallet').value,
                course: document.getElementById('certCourse').value,
                grade: document.getElementById('certGrade').value,
                year: document.getElementById('certYear').value,
                admin_wallet: document.getElementById('certAdminWallet').value
            };
            
            const response = await fetch('/api/issue_certificate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            if (result.success) {
                resultDiv.innerHTML = `
                    <div class="bg-green-100 border border-green-400 rounded-lg p-6">
                        <p class="text-green-800 text-xl font-bold mb-4">✅ Certificate Issued Successfully!</p>
                        <div class="space-y-2 text-gray-700">
                            <p><strong>Certificate ID:</strong> ${result.certificate_id}</p>
                            <p><strong>Blockchain Hash:</strong> ${result.block_hash.substring(0, 32)}...</p>
                            <p><strong>Skills Extracted:</strong> ${result.skills_extracted.join(', ')}</p>
                            <div class="mt-4 grid grid-cols-2 gap-4">
                                <img src="${result.nft_badge}" alt="NFT Badge" class="rounded-lg shadow-lg">
                                <img src="${result.qr_code}" alt="QR Code" class="rounded-lg shadow-lg">
                            </div>
                            <a href="/verify/${result.certificate_id}" target="_blank" class="inline-block mt-4 bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">View Certificate</a>
                        </div>
                    </div>
                `;
                e.target.reset();
            } else {
                resultDiv.innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">${result.error}</div>`;
            }
        });

        async function loadStudents() {
            const response = await fetch('/api/wallets');
            const data = await response.json();
            const students = data.student_wallets;
            
            let html = '<table class="min-w-full bg-white"><thead class="bg-gray-100"><tr>';
            html += '<th class="px-4 py-2 text-left">Name</th><th class="px-4 py-2 text-left">Email</th>';
            html += '<th class="px-4 py-2 text-left">Wallet Address</th><th class="px-4 py-2 text-left">Certificates</th><th class="px-4 py-2 text-left">Actions</th></tr></thead><tbody>';
            
            students.forEach(student => {
                html += `<tr class="border-t"><td class="px-4 py-2">${student.name}</td>`;
                html += `<td class="px-4 py-2">${student.email}</td>`;
                html += `<td class="px-4 py-2 text-xs">${student.wallet_address}</td>`;
                html += `<td class="px-4 py-2">${student.certificates_received}</td>`;
                html += `<td class="px-4 py-2"><a href="/student/${student.wallet_address}" class="text-blue-600 hover:underline">View</a></td></tr>`;
            });
            
            html += '</tbody></table>';
            document.getElementById('studentsList').innerHTML = html;
        }

        async function loadBlockchain() {
            const response = await fetch('/api/blockchain');
            const data = await response.json();
            
            let html = `<div class="mb-4 p-4 bg-${data.is_valid ? 'green' : 'red'}-100 border border-${data.is_valid ? 'green' : 'red'}-400 rounded">`;
            html += `<p class="font-bold">Blockchain Status: ${data.is_valid ? '✅ Valid' : '❌ Invalid'}</p>`;
            html += `<p>Total Blocks: ${data.length}</p></div>`;
            
            html += '<div class="space-y-4">';
            data.chain.slice().reverse().forEach((block, i) => {
                html += `<div class="border border-gray-300 rounded-lg p-4">`;
                html += `<div class="font-bold text-lg mb-2">Block #${block.index}</div>`;
                html += `<p class="text-xs text-gray-600 mb-2">Hash: ${block.hash}</p>`;
                if (block.data && block.data.certificate_id) {
                    html += `<p><strong>Certificate:</strong> ${block.data.certificate_id}</p>`;
                    html += `<p><strong>Student:</strong> ${block.data.student_name}</p>`;
                    html += `<p><strong>Course:</strong> ${block.data.course}</p>`;
                }
                html += `</div>`;
            });
            html += '</div>';
            
            document.getElementById('blockchainData').innerHTML = html;
        }
    </script>
</body>
</html>
